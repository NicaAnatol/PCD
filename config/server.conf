

server: {
    inet_port = 18081;
    unix_socket = "/tmp/geods";
    max_clients = 10;
    buffer_size = 4096;
    
    geo: {
        earth_radius = 6371.0;
        num_children = 4;
        temp_dir = "/tmp/geo_processing";
        bbox: {
            min_lat = -90.0;
            max_lat = 90.0;
            min_lon = -180.0;
            max_lon = 180.0;
        };
    };
};